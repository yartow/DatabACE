services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ceder
      POSTGRES_USER: ceder
      POSTGRES_PASSWORD: ceder_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceder"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://ceder:ceder_local@db:5432/ceder
      SESSION_SECRET: local-dev-session-secret-change-me
      LOCAL_DEV: "true"
      LOCAL_DEV_USER_ID: local-admin
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
